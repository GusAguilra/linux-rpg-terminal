<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aetheria — RPG + Linux Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace}
#app{width:880px;max-width:98vw;height:96vh;max-height:840px;display:flex;flex-direction:column;border:2px solid #2a4a2a;border-radius:6px;overflow:hidden}
#map-wrap{position:relative;background:#1a2a1a;height:360px;flex:0 0 auto;overflow:hidden}
#map{display:block;width:100%;height:100%;image-rendering:pixelated}
#map-ui{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;pointer-events:none}
#map-ui .loc{color:#ffd54f;font-size:13px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:3px}
#map-ui .hud{color:#fff;font-size:12px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:3px;display:flex;gap:12px}
#map-ui .hud .hp{color:#ef5350}
#map-ui .hud .gold{color:#ffd54f}
#term{background:#0d120d;padding:8px 10px;flex:1 1 auto;min-height:340px;overflow-y:auto;border-top:1px solid #2a4a2a;font-size:14px;line-height:1.5;scroll-behavior:smooth}
#term::-webkit-scrollbar{width:5px}
#term::-webkit-scrollbar-track{background:#0d120d}
#term::-webkit-scrollbar-thumb{background:#2a4a2a;border-radius:2px}
.term-line{margin:0;white-space:pre-wrap;word-wrap:break-word}
.term-line.cmd{color:#a5d6a7}
.term-line.out{color:#00e676}
.term-line.err{color:#ef5350}
.term-line.info{color:#4dd0e1}
.term-line.warn{color:#ffb74d}
.term-line.lore{color:#ffd54f}
.term-line.dlg{color:#ce93d8}
.term-line.combat{color:#ff6b6b}
.term-line.help{color:#64b5f6}
.term-line.title{color:#ffd54f;font-weight:bold}
.term-line.dim{color:#2a5a2a}
.term-line.success{color:#ffd54f;font-weight:bold}
#input-row{display:flex;align-items:center;background:#0d120d;padding:4px 10px 8px;border-top:1px solid #1a2a1a;flex:0 0 auto}
#prompt{color:#a5d6a7;white-space:pre;user-select:none;font-size:14px}
#cmd{flex:1;background:transparent;border:none;outline:none;color:#00e676;font:inherit;font-size:14px;caret-color:#00e676;padding:0 0 0 6px}
#cmd::placeholder{color:#1a4a1a}
</style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <canvas id="map"></canvas>
    <div id="map-ui">
      <span class="loc" id="locDisplay">~/</span>
      <span class="hud"><span>❤️ <span id="hpVal">100</span>/<span id="maxHpVal">100</span></span><span>⚔️ <span id="atkVal">12</span></span><span>🛡️ <span id="defVal">5</span></span><span>⭐ Nv <span id="lvlVal">1</span></span><span>💰 <span id="goldVal">0</span></span></span>
    </div>
  </div>
  <div id="term"></div>
  <div id="input-row">
    <span id="prompt">guest@aetheria:~$ </span>
    <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off" placeholder="help">
  </div>
</div>
<script>
// ═══════════════════════════════════════════
//  AETHERIA — RPG híbrido: visual + terminal
//  Todos los comandos son Linux reales
// ═══════════════════════════════════════════

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const W = 880, H = 360;
canvas.width = W; canvas.height = H;
const TILE = 40;
const COLS = Math.floor(W / TILE); // 22
const ROWS = Math.floor(H / TILE); // 9
let _vignette = null; // cache de gradiente de viñeta

// ─── TILE TYPES & COLORS ───
const T = {
  FLOOR:0, GRASS:1, WALL:2, TREE:3, WATER:4,
  PATH:5, DOOR:6, CHEST:7, BRIDGE:8, HOUSEWALL:9,
  THRONE:10, RUG:11, TABLE:12, TORCH:13,
};

const tileDraw = {};
tileDraw[T.FLOOR] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle=(x+y)%2?'#474747':'#525252';ctx.fillRect(px,py,TILE,TILE);
  // junta de baldosa
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(px,py,TILE,1);ctx.fillRect(px,py,1,TILE);
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(px+1,py+1,TILE-2,1);
  // motas de desgaste deterministas
  if((x*5+y*11)%4===0){ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fillRect(px+9,py+24,4,3);}
  if((x*3+y*7)%5===0){ctx.fillStyle='rgba(0,0,0,0.10)';ctx.fillRect(px+26,py+11,3,3);}
};
tileDraw[T.GRASS] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  // base con variación
  ctx.fillStyle=['#3a7a1e','#3e7e22','#36801a','#347818'][(x*7+y*13)%4];ctx.fillRect(px,py,TILE,TILE);
  // manchas de luz/sombra para dar volumen
  ctx.fillStyle='rgba(255,255,80,0.05)';ctx.fillRect(px,py,TILE,TILE/2);
  ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(px,py+TILE/2,TILE,TILE/2);
  // briznas de pasto (deterministas, leve mecida con animTime)
  const sway=Math.sin((animTime+x*9+y*5)/22)*1.2;
  ctx.fillStyle='#2d6a14';
  if((x+y)%3===0){ctx.fillRect(px+6+sway,py+22,2,8);ctx.fillRect(px+10+sway,py+25,2,5);}
  if((x*2+y)%4===0){ctx.fillStyle='#4a9a2a';ctx.fillRect(px+26-sway,py+18,2,9);ctx.fillRect(px+30-sway,py+22,2,6);}
  // florecitas ocasionales
  if((x*13+y*7)%11===0){ctx.fillStyle='#f0e040';ctx.fillRect(px+18,py+12,3,3);ctx.fillStyle='#fff';ctx.fillRect(px+19,py+13,1,1);}
};
tileDraw[T.WALL] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#5a5a5a';ctx.fillRect(px,py,TILE,TILE);
  // bloques de piedra (patrón de ladrillo desfasado)
  const off=(y%2)*10;
  ctx.fillStyle='#646464';
  ctx.fillRect(px+2-off,py+2,18,9);ctx.fillRect(px+22-off,py+2,18,9);
  ctx.fillRect(px+12-off,py+13,18,9);ctx.fillRect(px-8+off,py+13,18,9);
  ctx.fillRect(px+2-off,py+24,18,9);ctx.fillRect(px+22-off,py+24,18,9);
  // luces y sombras de relieve
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(px+2-off,py+2,18,2);ctx.fillRect(px+12-off,py+13,18,2);
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(px,py+TILE-3,TILE,3);
};
tileDraw[T.TREE] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  const sway=Math.sin((animTime+x*11)/26)*1.5;
  // sombra en el suelo
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(px+20,py+36,13,4,0,0,Math.PI*2);ctx.fill();
  // tronco
  ctx.fillStyle='#4a3320';ctx.fillRect(px+16,py+26,8,12);
  ctx.fillStyle='#3a2614';ctx.fillRect(px+16,py+26,3,12);
  // copa en capas (sombra → base → luz)
  ctx.fillStyle='#163d16';ctx.beginPath();ctx.arc(px+20+sway,py+18,17,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1f5a1f';ctx.beginPath();ctx.arc(px+13+sway,py+13,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1f5a1f';ctx.beginPath();ctx.arc(px+28+sway,py+14,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2e7a2e';ctx.beginPath();ctx.arc(px+16+sway,py+10,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(150,220,120,0.35)';ctx.beginPath();ctx.arc(px+15+sway,py+9,4,0,Math.PI*2);ctx.fill();
};
tileDraw[T.WATER] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle='#225f92';ctx.fillRect(px,py,TILE,TILE);
  // degradado vertical sutil
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(px,py,TILE,TILE/2);
  // olas animadas
  const t=animTime/20, ph=x*0.6+y*0.9;
  ctx.fillStyle='rgba(170,210,240,0.55)';
  for(let i=0;i<3;i++){
    const wy=py+8+i*12, wx=px+4+Math.sin(t+ph+i)*6;
    ctx.fillRect(wx,wy,12,2);
  }
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillRect(px+6+Math.sin(t+ph)*5,py+6,5,1);
};
tileDraw[T.PATH] = (x,y) => {
  const px=x*TILE, py=y*TILE;
  ctx.fillStyle=['#b8985a','#b49a56','#bc9658','#b09254'][(x*3+y)%4];ctx.fillRect(px,py,TILE,TILE);
  // bordes con tierra oscura
  ctx.fillStyle='rgba(0,0,0,0.10)';ctx.fillRect(px,py,TILE,2);ctx.fillRect(px,py+TILE-2,TILE,2);
  // piedritas deterministas
  ctx.fillStyle='#9a7a3e';
  if((x+y)%2===0){ctx.fillRect(px+8,py+12,4,3);ctx.fillRect(px+24,py+26,5,3);}
  else{ctx.fillRect(px+14,py+22,4,3);ctx.fillRect(px+28,py+10,3,3);}
  ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(px+9,py+12,4,1);
};
tileDraw[T.DOOR] = (x,y) => {
  ctx.fillStyle='#6a4a2a';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
  ctx.fillStyle='#5a3a1a';ctx.fillRect(x*TILE+5,y*TILE+5,TILE-10,TILE-10);
  ctx.fillStyle='#8a6a3a';ctx.fillRect(x*TILE+8,y*TILE+8,TILE-16,TILE-16);
  ctx.fillStyle='#c89030';ctx.beginPath();ctx.arc(x*TILE+28,y*TILE+20,3,0,Math.PI*2);ctx.fill();
};
tileDraw[T.CHEST] = (x,y) => {
  ctx.fillStyle='#5a3a1a';ctx.fillRect(x*TILE+4,y*TILE+8,TILE-8,TILE-20);
  ctx.fillStyle='#c89030';ctx.fillRect(x*TILE+6,y*TILE+14,TILE-12,4);ctx.fillRect(x*TILE+6,y*TILE+22,TILE-12,4);
  ctx.fillStyle='#e8b030';ctx.beginPath();ctx.arc(x*TILE+20,y*TILE+24,3,0,Math.PI*2);ctx.fill();
};
tileDraw[T.BRIDGE] = (x,y) => {
  ctx.fillStyle='#9a8a6a';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
  ctx.fillStyle='#8a7a5a';ctx.fillRect(x*TILE+3,y*TILE+6,TILE-6,5);ctx.fillRect(x*TILE+3,y*TILE+18,TILE-6,5);ctx.fillRect(x*TILE+3,y*TILE+30,TILE-6,5);
  ctx.fillStyle='#7a6a4a';ctx.fillRect(x*TILE+6,y*TILE+11,5,18);ctx.fillRect(x*TILE+18,y*TILE+11,5,18);ctx.fillRect(x*TILE+30,y*TILE+11,5,18);
};
tileDraw[T.HOUSEWALL] = (x,y) => {
  ctx.fillStyle='#8a6a3a';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
  ctx.fillStyle='#7a5a2a';ctx.fillRect(x*TILE+3,y*TILE+3,TILE-6,TILE-6);
  ctx.fillStyle='#6a4a1a';ctx.fillRect(x*TILE+6,y*TILE+6,TILE-12,TILE-12);
};
tileDraw[T.THRONE] = (x,y) => {
  ctx.fillStyle='#5a3a1a';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
  ctx.fillStyle='#c89030';ctx.fillRect(x*TILE+8,y*TILE+8,24,20);
  ctx.fillStyle='#e8b030';ctx.fillRect(x*TILE+12,y*TILE+12,16,6);ctx.fillRect(x*TILE+14,y*TILE+20,4,6);ctx.fillRect(x*TILE+22,y*TILE+20,4,6);
};
tileDraw[T.RUG] = (x,y) => {
  ctx.fillStyle='#6a2a3a';ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
  ctx.fillStyle='#8a3a5a';ctx.fillRect(x*TILE+4,y*TILE+4,TILE-8,TILE-8);
  ctx.fillStyle='#a04060';ctx.fillRect(x*TILE+8,y*TILE+20,24,4);
};
tileDraw[T.TORCH] = (x,y) => {
  ctx.fillStyle='#3a3a3a';ctx.fillRect(x*TILE+16,y*TILE+8,8,24);
  ctx.fillStyle='#ff8a30';ctx.beginPath();ctx.arc(x*TILE+20,y*TILE+8,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffd030';ctx.beginPath();ctx.arc(x*TILE+20,y*TILE+8,3,0,Math.PI*2);ctx.fill();
};

// ─── ROOM MAPS (COLSxROWS tile grids) ───
// Each room has a tile[][] and overlays (npcs, items at tile coords)
const rooms = {};

function defRoom(id, tiles, overlays, opts) {
  rooms[id] = { tiles, overlays:overlays||[], ...(opts||{}) };
}

// Helper: parse a string map into tile[][] 
function parseMap(strs, legend) {
  return strs.map(row => [...row].map(ch => legend[ch]!==undefined ? legend[ch] : T.GRASS));
}

const L = {
  '.':T.FLOOR,',':T.GRASS,'#':T.WALL,'T':T.TREE,'W':T.WATER,
  'P':T.PATH,'D':T.DOOR,'C':T.CHEST,'B':T.BRIDGE,'H':T.HOUSEWALL,
  'R':T.RUG,'S':T.THRONE,'F':T.TORCH,' ':'skip',
};

// ─── ROOM DEFINITIONS ───
// Overlays: {type, x, y, data}
// type: 'npc', 'item', 'enemy', 'player' (player spawn)

function initWorld() {
  defRoom('/', parseMap([
    '######################',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,TT,,,,,,TT,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,PPP,,,,,,,,,,,,,,#',
    '#,,,PPP,,,,,,,,,,,,,,#',
    '#,,,PPP,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
  ], L), [
    {type:'player',x:10,y:5},
    {type:'door',x:3,y:2,label:'castle/',room:'/castle',desc:'Camino al castillo'},
    {type:'door',x:12,y:1,label:'forest/',room:'/forest',desc:'Entrada al bosque'},
    {type:'door',x:18,y:4,label:'village/',room:'/village',desc:'Camino a la aldea'},
    {type:'door',x:18,y:8,label:'mountain/',room:'/mountain',desc:'Sendero a la Montaña del Kernel'},
    {type:'npc',x:6,y:4,label:'Guard',desc:'Un guardia real con armadura reluciente.',dialog:['El reino está en peligro... el Rey ha caído bajo un hechizo.','Adéntrate en el bosque y busca la cueva.'],dialogAfter:['¡Has salvado el reino, héroe! Tu manejo de Linux es tan letal como tu espada.','El Rey ha despertado y quiere darte las gracias en persona.'],patrol:{dir:0,steps:2}},
    {type:'item',x:14,y:7,label:'letter.txt',icon:'📜',desc:'CARTA DEL VIEJO ALDRIC\n━━━━━━━━━━━━━━━━━━━━━\n"Viajero, si lees esto aún hay esperanza.\nEl Rey ha caído bajo un hechizo oscuro.\nBusca la espada ancestral y adéntrate en la cueva."',takeable:false},
  ]);

  defRoom('/castle', parseMap([
    '######################',
    '#HHHHHHHHHHHHHHHHHHHH#',
    '#H..................H#',
    '#H..FFF.............H#',
    '#H..................H#',
    '#H..................H#',
    '#H..FFF.............H#',
    '#H..................H#',
    '#HHHHH..D..HHHHHHHHHH#',
  ], L), [
    {type:'player',x:10,y:8},
    {type:'door',x:9,y:1,label:'gate/',room:'/castle/gate',desc:'Puerta principal'},
    {type:'door',x:8,y:8,label:'../',room:'/',desc:'Volver al camino'},
    {type:'npc',x:4,y:3,label:'Tower_Guard',desc:'Guardia de la torre oeste.',dialog:['Arriba hay un arco en la torre. Nadie lo usa desde hace años.','Para llegar: primero ve a gate/ con "cd gate/", luego "cd guard_tower/".'],dialogAfter:['Lograste lo imposible. El reino está en paz gracias a ti.','Nunca había visto a alguien manejar el terminal con tanta destreza.'],patrol:{dir:2,steps:1}},
    {type:'item',x:15,y:4,label:'cofre',icon:'🗃️',desc:'COFRE ANTIGUO\nUn cofre de hierro con un candado sólido. Necesitas una llave especial.\n\n💡 Usa "./cofre" si tienes la llave.',takeable:false,usable:true,useAction:()=>{
      if(!player.inventory.includes('iron_key.txt'))return ['❌ El cofre está cerrado. Necesitas una llave.','err'];
      player.inventory=player.inventory.filter(i=>i!=='iron_key.txt');
      player.armor=true;player.def+=5;
      updateHud();
      renderRoom();
      return ['🗝️  Usaste la Llave de Hierro. El cofre se abre...\n\n  🛡️  ARMADURA DE ACERO LEGENDARIA\n  ¡Te has equipado con la armadura del reino!\n  Defensa +5 — visible en tu personaje.','out'];
    }},
  ]);

  defRoom('/castle/gate', parseMap([
    '######################',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,RRRRR,,RRRRR,,,,,#',
    '#,,,RRRRR,,RRRRR,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
  ], L), [
    {type:'player',x:10,y:7},
    {type:'door',x:6,y:2,label:'throne_room/',room:'/castle/gate/throne_room',desc:'Sala del trono'},
    {type:'door',x:15,y:2,label:'guard_tower/',room:'/castle/gate/guard_tower',desc:'Torre de guardia'},
    {type:'door',x:1,y:4,label:'../',room:'/castle',desc:'Volver al castillo'},
    {type:'item',x:10,y:3,label:'shield.txt',icon:'🛡️',desc:'ESCUDO DE ACERO\n━━━━━━━━━━━━━━\nUn escudo con el emblema del halcón. Abollado pero resistente.\n\n💡 Usa "cp shield.txt ~/" para equiparlo. Defensa +3.',takeable:true,onTake:()=>{player.def+=3;player.inventory.push('shield.txt');return '🛡️ Escudo equipado. Defensa +3.'}},
    {type:'enemy',x:8,y:4,label:'Goblin_Sentinel',hp:22,maxHp:22,atk:8,def:3,xp:18,gold:15,dialog:'Un goblin pequeño pero ruidoso te bloquea el paso.'},
  ]);

  defRoom('/castle/gate/throne_room', parseMap([
    '######################',
    '#HHHHHHHHHHHHHHHHHHHH#',
    '#H..................H#',
    '#H..................H#',
    '#H..................H#',
    '#H..................H#',
    '#H..................H#',
    '#H..................H#',
    '#HHHHHHHHHHHH..HHHHHH#',
  ], L), [
    {type:'player',x:5,y:6},
    {type:'door',x:14,y:8,label:'../',room:'/castle/gate',desc:'Volver a la puerta'},
    {type:'npc',x:10,y:3,label:'King',desc:'👑 REY LEOVIGILDO\nEstá sentado en su trono, mirada vidriosa.',dialog:['"El... el susurro... viene del bosque..."','No parece reconocerte. Tal vez puedas ayudarlo más adelante.'],dialogAfter:['¡Te has convertido en un verdadero maestro de Linux! —dice el Rey con orgullo.','"Tu habilidad con el terminal ha salvado nuestro reino. Sigue explorando, que el conocimiento es infinito."']},
    {type:'npc',x:4,y:4,label:'Orin',desc:'Un anciano con túnica azul.',dialog:['El Rey no ha sido el mismo desde la luna negra.','Por favor, encuentra el origen del mal en el bosque.'],dialogAfter:['La luz ha vuelto al reino. Has demostrado que el verdadero poder está en el conocimiento.','Sigue aprendiendo, joven. Linux es un océano infinito. ¡Navega siempre!']},
  ]);

  defRoom('/castle/gate/guard_tower', parseMap([
    '######################',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',
  ], L), [
    {type:'player',x:10,y:7},
    {type:'door',x:10,y:1,label:'../',room:'/castle/gate',desc:'Bajar de la torre'},
    {type:'item',x:15,y:3,label:'bow.txt',icon:'🏹',desc:'ARCO CORTO\n━━━━━━━━━━━━\nArco de fresno bien trabajado, cuerda aún tensa.\n\n💡 Usa "cp bow.txt ~/". Ataque +4.',takeable:true,onTake:()=>{player.atk+=4;player.inventory.push('bow.txt');return '🏹 Arco equipado. Ataque +4.'}},
  ]);

  defRoom('/forest', parseMap([
    '######################',
    '#TTTT,,,,TTTT,,,,,TTT#',
    '#,,,,,,,,,,,,,,,,,,,,#',
    '#,,,,,,,,,,,,,,,,,,,,#',

function tPrint(text, cls='out') {
  const d = document.createElement('div');
  d.className = 'term-line ' + cls;
  d.textContent = text;
  termEl.appendChild(d);
  termEl.scrollTop = termEl.scrollHeight;
}

function tPrintMany(lines) {
  for (const [text, cls] of lines) tPrint(text, cls);
}

function setHint(text, cls){
  if(hintEl){
    hintEl.textContent = text;
    hintEl.className = 'term-line ' + cls;
    return;
  }
  hintEl = document.createElement('div');
  hintEl.className = 'term-line ' + cls;
  hintEl.textContent = text;
  termEl.appendChild(hintEl);
  termEl.scrollTop = termEl.scrollHeight;
}

function clearHint(){
  if(hintEl){
    hintEl.remove();

}

// ─── MOVEMENT ───
const WALKABLE = [T.FLOOR,T.GRASS,T.PATH,T.DOOR,T.CHEST,T.BRIDGE,T.RUG,T.THRONE,T.TORCH];

function isWalkableTile(tile) { return WALKABLE.includes(tile); }

function tryMove(dx, dy) {
  if (gameState !== 'idle') return;
  const room = rooms[player.room];
  if (!room) return;
  const nx = player.px + dx, ny = player.py + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  const tile = room.tiles[ny] ? room.tiles[ny][nx] : undefined;
  if (tile === undefined || tile === 'skip') return;
  // Doors are always walkable regardless of underlying tile
  const isDoor = room.overlays.some(o => o.type === 'door' && o.x === nx && o.y === ny);
  if (!isDoor && !isWalkableTile(tile)) return;

  // Check for enemy blocking
  const enemyHere = room.overlays.find(o => o.type === 'enemy' && o.hp > 0 && o.x === nx && o.y === ny);
  if (enemyHere) {
    tPrint(`⚠️  ${enemyHere.label} te bloquea el paso. Usa "kill <PID>" (revisa "ps" primero).`,'combat');
    return;
  }

  const oldX=player.px, oldY=player.py;
  player.px = nx; player.py = ny;
  spawnParticles(oldX, oldY, 'rgba(180,180,160,0.7)', 3, 1.2);
  AUDIO.play('select');
  renderRoom();

  // Check item pickup
  const item = room.overlays.find(o => o.type === 'item' && o.x === nx && o.y === ny && o.takeable);
  if (item) {
    const near = room.overlays.filter(o => {
      if(o.type !== 'npc' && o.type !== 'item' && o.type !== 'enemy' && o.type !== 'door') return false;
      if(o.hp === 0) return false;
      if(room.dark){
        const vis = lanternOn ? 5 : 2.5;
        if(Math.hypot(o.x-player.px, o.y-player.py) > vis) return false;
      }
      return Math.abs(o.x - player.px) <= 1 && Math.abs(o.y - player.py) <= 1;
    });
    if (near.length) {
      const doors=near.filter(o=>o.type==='door');
      const rest=near.filter(o=>o.type!=='door');
      if(doors.length)diaryAdd('cd <puerta>', 'Cambia de sala. Ej: cd castle/, cd forest/, cd ..');
      if(rest.length)diaryAdd('cat <nombre>', 'Examina o habla con un NPC/item/enemigo. Ej: cat Guard, cat shield.txt');
      let hint='';
      if(rest.length)hint+=`📋  Cerca: ${rest.map(o=>o.label).join(', ')} — usa "cat <nombre>"`;
      if(doors.length){
        if(hint)hint+=' | ';
        hint+=`🚪 ${doors.map(o=>o.label==='../'?'"cd .."':`"cd ${o.label}"`).join(', ')} para entrar`;
      }
      setHint(hint,'info');
    } else {
      clearHint();
    }
    return;
  }

  // Show nearby interactables
  const near = room.overlays.filter(o => {
    if(o.type !== 'npc' && o.type !== 'item' && o.type !== 'enemy' && o.type !== 'door') return false;
    if(o.hp && o.hp <= 0) return false;
    if(room.dark){
      const vis = lanternOn ? 5 : 2.5;
      if(Math.hypot(o.x-player.px, o.y-player.py) > vis) return false;
    }
    return Math.abs(o.x - player.px) <= 1 && Math.abs(o.y - player.py) <= 1;
  });
  if (near.length) {
    const doors=near.filter(o=>o.type==='door');
    const rest=near.filter(o=>o.type!=='door');
    if(doors.length)diaryAdd('cd <puerta>', 'Cambia de sala. Ej: cd castle/, cd forest/, cd ..');
    if(rest.length)diaryAdd('cat <nombre>', 'Examina o habla con un NPC/item/enemigo. Ej: cat Guard, cat shield.txt');
    let hint='';
    if(rest.length)hint+=`📋  Cerca: ${rest.map(o=>o.label).join(', ')} — usa "cat <nombre>"`;
    if(doors.length){
      if(hint)hint+=' | ';
      hint+=`🚪 ${doors.map(o=>o.label==='../'?'"cd .."':`"cd ${o.label}"`).join(', ')} para entrar`;
    }
    setHint(hint,'info');
  } else {
    clearHint();
  }
}

// ─── ENEMY PATROL ───
function enemyPatrol() {
  if(gameState!=='idle')return;
  for(const roomId in rooms){
    const room=rooms[roomId];
    for(const o of room.overlays){
      if(o.type!=='enemy'||o.hp<=0||o.nopatrol)continue;
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
      for(let i=dirs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
      for(const[dx,dy]of dirs){
        const nx=o.x+dx,ny=o.y+dy;
        if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        const tile=room.tiles[ny]?.[nx];
        if(tile===undefined||tile==='skip')continue;
        const isDoor=room.overlays.some(ov=>ov.type==='door'&&ov.x===nx&&ov.y===ny);
        const occupied=room.overlays.some(ov=>
          (ov.type==='enemy'&&ov!==o&&ov.hp>0&&ov.x===nx&&ov.y===ny)||
          (ov.type==='npc'&&ov.x===nx&&ov.y===ny)||
          (ov.type==='player'&&ov.x===nx&&ov.y===ny));
        if(occupied)continue;
        if(isDoor||isWalkableTile(tile)){o.x=nx;o.y=ny;break;}
      }
    }
  }
  renderRoom();
}

function npcPatrol() {
  if(gameState!=='idle')return;
  for(const roomId in rooms){
    const room=rooms[roomId];
    for(const o of room.overlays){
      if(o.type!=='npc'||!o.patrol)continue;
      if(o._ps===undefined)o._ps=0;
      if(o._pd===undefined)o._pd=1;
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
      const [dx,dy]=dirs[o.patrol.dir];
      const nx=o.x+dx*o._pd, ny=o.y+dy*o._pd;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      const tile=room.tiles[ny]?.[nx];
      if(tile===undefined||tile==='skip')continue;
      const isDoor=room.overlays.some(ov=>ov.type==='door'&&ov.x===nx&&ov.y===ny);
      const occupied=room.overlays.some(ov=>
        (ov.type==='enemy'&&ov.hp>0&&ov.x===nx&&ov.y===ny)||
        (ov.type==='npc'&&ov!==o&&ov.x===nx&&ov.y===ny)||
        (ov.type==='player'&&ov.x===nx&&ov.y===ny));
      if(occupied)continue;
      if(isDoor||isWalkableTile(tile)){
        o.x=nx; o.y=ny;
        o._ps++;
        if(o._ps>=o.patrol.steps){o._ps=0;o._pd*=-1;}
      }
    }
  }
  renderRoom();
}

// ─── AUTO-MOVE TO TARGET ───
let isMoving = false;

function findTarget(name) {
  const room = rooms[player.room];
  if (!room) return null;
  const clean = name.toLowerCase().replace(/\/$/,'');
  return room.overlays.find(o => {
    const ln = (o.label||'').toLowerCase().replace(/\/$/,'');
    return ln === clean || ln === clean + '.txt' || ln.replace('.txt','') === clean;
  }) || null;
}

function bfsPath(sx, sy, tx, ty) {
  const room = rooms[player.room];
  if (!room) return null;
  const visited = new Set();
  const queue = [{x:sx, y:sy, path:[]}];
  visited.add(`${sx},${sy}`);
  while (queue.length) {
    const {x,y,path} = queue.shift();
    if (x === tx && y === ty) return path;
    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = x+dx, ny = y+dy;
      const key = `${nx},${ny}`;
      if (visited.has(key) || nx<0 || nx>=COLS || ny<0 || ny>=ROWS) continue;
      const tile = room.tiles[ny]?.[nx];
      if (tile === undefined || tile === 'skip') continue;
      // Doors are always walkable
      const isDoor = room.overlays.some(o => o.type === 'door' && o.x === nx && o.y === ny);
      // Enemy blocks movement (unless it's the target)
      const hasEnemy = room.overlays.find(o => o.type === 'enemy' && o.hp > 0 && o.x === nx && o.y === ny && !(nx===tx&&ny===ty));
      if ((!isDoor && !isWalkableTile(tile)) || hasEnemy) continue;
      visited.add(key);
      queue.push({x:nx, y:ny, path:[...path, {x:nx, y:ny}]});
    }
  }
  return null; // unreachable
}

function moveToTarget(tx, ty, callback) {
  if (isMoving) return;
  const path = bfsPath(player.px, player.py, tx, ty);
  if (!path) { tPrint(`❌ No hay camino hacia allí.`,'err'); return; }
  isMoving = true;
  gameState = 'moving';
  let step = 0;
  function doStep() {
    if (step >= path.length) {
      isMoving = false;
      gameState = 'idle';
      renderRoom();
      callback();
      return;
    }
    player.px = path[step].x;
    player.py = path[step].y;
    renderRoom();
    step++;
    setTimeout(doStep, 100);
  }
  doStep();
}

// Walk to a tile ADJACENT to (tx, ty) instead of on top of it
function bfsPathAdjacent(tx, ty) {
  const room = rooms[player.room];
  if (!room) return null;
  const visited = new Set();
  const queue = [{x:player.px, y:player.py, path:[]}];
  visited.add(`${player.px},${player.py}`);
  while (queue.length) {
    const {x,y,path} = queue.shift();
    // Check if this tile is adjacent to target and walkable
    const adj = Math.abs(x-tx) + Math.abs(y-ty) === 1;
    if (adj) return path;
    for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = x+dx, ny = y+dy;
      const key = `${nx},${ny}`;
      if (visited.has(key) || nx<0 || nx>=COLS || ny<0 || ny>=ROWS) continue;
      // Don't step ON the target tile
      if (nx===tx && ny===ty) continue;
      const tile = room.tiles[ny]?.[nx];
      if (tile === undefined || tile === 'skip') continue;
      const isDoor = room.overlays.some(o => o.type === 'door' && o.x === nx && o.y === ny);
      const hasEnemy = room.overlays.find(o => o.type === 'enemy' && o.hp > 0 && o.x === nx && o.y === ny);
      if ((!isDoor && !isWalkableTile(tile)) || hasEnemy) continue;
      visited.add(key);
      queue.push({x:nx, y:ny, path:[...path, {x:nx, y:ny}]});
    }
  }
  return null;
}

function moveToTargetAdjacent(tx, ty, callback) {
  if (isMoving) return;
  const path = bfsPathAdjacent(tx, ty);
  if (!path) { tPrint(`❌ No hay camino hacia allí.`,'err'); return; }
  isMoving = true;
  gameState = 'moving';
  let step = 0;
  function doStep() {
    if (step >= path.length) {
      isMoving = false;
      gameState = 'idle';
      renderRoom();
      callback();
      return;
    }
    player.px = path[step].x;
    player.py = path[step].y;
    renderRoom();
    step++;
    setTimeout(doStep, 100);
  }
  doStep();
}

let hitEffect = null;
let playerHitEffect = null;

// ─── VISUAL FX: shake, floating text, particles ───
let shakeT = 0, shakeMag = 0;
function screenShake(mag=6, frames=8){ shakeMag=mag; shakeT=frames; }
const floaters = []; // {x,y,text,color,life,vy}
function addFloater(tileX, tileY, text, color='#fff'){
  floaters.push({x:tileX*TILE+20, y:tileY*TILE+10, text, color, life:40, vy:-0.7});
}
const particles = []; // {x,y,vx,vy,life,color,size}
function spawnParticles(tileX, tileY, color, count=10, spread=2.5){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*spread+0.5;
    particles.push({x:tileX*TILE+20, y:tileY*TILE+20, vx:Math.cos(a)*s, vy:Math.sin(a)*s-0.5,
      life:Math.random()*20+15, maxLife:35, color, size:Math.random()*3+1});
  }
}
let fadeAlpha = 0; // transición de sala (1 = negro, baja a 0)
let animTime = 0;  // contador global para animaciones idle

// Bucle de animación continuo (independiente del render por acción)
function fxLoop(){
  animTime++;
  // actualizar partículas
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  // actualizar floaters
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y+=f.vy; f.life--;
    if(f.life<=0)floaters.splice(i,1);
  }
  if(shakeT>0)shakeT--;
  if(fadeAlpha>0)fadeAlpha=Math.max(0,fadeAlpha-0.06);
  renderRoom();
  requestAnimationFrame(fxLoop);
}

// ─── RENDER MAP ───
function renderRoom() {
  const room = rooms[player.room];
  if (!room) return;
  ctx.save();
  // screen shake
  if(shakeT>0){
    const dx=(Math.random()*2-1)*shakeMag, dy=(Math.random()*2-1)*shakeMag;
    ctx.translate(dx,dy);
  }
  ctx.fillStyle='#0a0e0a';ctx.fillRect(-10,-10,W+20,H+20);
  const tiles = room.tiles;
  const overlays = room.overlays;

  // Draw tiles
  for (let y = 0; y < tiles.length && y < ROWS; y++) {
    for (let x = 0; x < tiles[y].length && x < COLS; x++) {
      const t = tiles[y][x];
      if (t === 'skip') continue;
      const fn = tileDraw[t];
      if (fn) fn(x, y);
    }
  }

  // Draw overlays
  for (const o of overlays) {
    if (o.type === 'npc') {
      const sx=o.x*TILE;
      const sy=o.y*TILE + Math.round(Math.sin((animTime+o.x*7+o.y*3)/16)*1.2);
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(sx+20,o.y*TILE+34,12,5,0,0,Math.PI*2);ctx.fill();
      const label = o.label;
      if(label==='Guard'||label==='Tower_Guard'){
        // Guard: armor + spear
        ctx.fillStyle='#4a6a8a';ctx.fillRect(sx+10,sy+14,20,16); // body
        ctx.fillStyle='#6a8aaa';ctx.fillRect(sx+12,sy+4,16,12); // head
        ctx.fillStyle='#8a9aaa';ctx.fillRect(sx+12,sy+4,16,3); // helmet top
        ctx.fillStyle='#e8c888';ctx.fillRect(sx+13,sy+5,14,7); // face
        ctx.fillStyle='#fff';ctx.fillRect(sx+15,sy+7,3,3);ctx.fillRect(sx+22,sy+7,3,3); // eyes
        ctx.fillStyle='#222';ctx.fillRect(sx+16,sy+8,1,1);ctx.fillRect(sx+23,sy+8,1,1); // pupils
        ctx.fillStyle='#6a4a2a';ctx.fillRect(sx+4,sy+26,4,10); // spear handle
        ctx.fillStyle='#aaa';ctx.fillRect(sx+3,sy+22,6,4); // spear tip
      }else if(label==='King'){
        // King: purple robe, crown

        ctx.fillStyle=isBoss?'#ff4444':'#ff6b6b';ctx.font=isBoss?'9px monospace':'7px monospace';
        ctx.fillText(`❤️${o.hp}`,sx+20,sy-1-isBoss*6);
      }
    }
  }

  // Hit effect overlays
  function drawHit(eff){
    if(!eff||eff.life<=0)return;
    const hx=eff.x*TILE, hy=eff.y*TILE;
    ctx.fillStyle=eff.color||'rgba(255,255,200,0.4)';ctx.fillRect(hx,hy,TILE,TILE);
    ctx.strokeStyle=eff.border||'#fff';ctx.lineWidth=2;ctx.strokeRect(hx,hy,TILE,TILE);
    eff.life--;
  }
  drawHit(hitEffect);if(hitEffect&&hitEffect.life<=0)hitEffect=null;
  drawHit(playerHitEffect);if(playerHitEffect&&playerHitEffect.life<=0)playerHitEffect=null;

  // Draw player (con bobbing idle)
  const bob = Math.round(Math.sin(animTime/14)*1.5);
  const px = player.px*TILE, py = player.py*TILE + bob;
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(px+20,player.py*TILE+34,12,5,0,0,Math.PI*2);ctx.fill();
  if(player.armor){
    // Armored player (silver/steel)
    ctx.fillStyle='#8a9aaa';ctx.fillRect(px+10,py+14,20,16);
    ctx.fillStyle='#9ab0c0';ctx.fillRect(px+12,py+4,16,12);
    ctx.fillStyle='#b0c8d8';ctx.fillRect(px+10,py+14,20,4);
    ctx.fillStyle='#b0c8d8';ctx.fillRect(px+10,py+26,20,4);
    ctx.fillStyle='#e8c888';ctx.fillRect(px+13,py+5,14,7);
    ctx.fillStyle='#fff';ctx.fillRect(px+15,py+7,3,3);ctx.fillRect(px+22,py+7,3,3);
    ctx.fillStyle='#222';ctx.fillRect(px+16,py+8,1,1);ctx.fillRect(px+23,py+8,1,1);
    ctx.fillStyle='#c0392b';ctx.fillRect(px+11,py+1,18,4);
    ctx.fillStyle='#6a7a8a';ctx.fillRect(px+8,py+16,4,12);ctx.fillRect(px+28,py+16,4,12);
  }else{
    // piernas y botas
    ctx.fillStyle='#2a2a3a';ctx.fillRect(px+13,py+28,5,7);ctx.fillRect(px+22,py+28,5,7);
    ctx.fillStyle='#1a1a24';ctx.fillRect(px+13,py+33,5,2);ctx.fillRect(px+22,py+33,5,2);
    // túnica/cuerpo con sombreado
    ctx.fillStyle='#3a7bd5';ctx.fillRect(px+10,py+14,20,16);
    ctx.fillStyle='#2f66b4';ctx.fillRect(px+10,py+14,20,16);
    ctx.fillStyle='#3a7bd5';ctx.fillRect(px+11,py+14,18,14);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(px+11,py+14,18,3);
    // brazos
    ctx.fillStyle='#2f66b4';ctx.fillRect(px+7,py+15,4,11);ctx.fillRect(px+29,py+15,4,11);
    ctx.fillStyle='#e8c888';ctx.fillRect(px+7,py+24,4,3);ctx.fillRect(px+29,py+24,4,3); // manos
    // cinturón
    ctx.fillStyle='#5a3a1a';ctx.fillRect(px+10,py+26,20,2);ctx.fillStyle='#c89030';ctx.fillRect(px+18,py+26,4,2);
    // cabeza
    ctx.fillStyle='#e8c888';ctx.fillRect(px+13,py+5,14,9);
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(px+24,py+5,3,9); // sombra mejilla
    // capucha/pelo
    ctx.fillStyle='#3a4a6a';ctx.fillRect(px+12,py+3,16,4);ctx.fillRect(px+12,py+5,2,6);ctx.fillRect(px+26,py+5,2,6);
    // ojos
    ctx.fillStyle='#fff';ctx.fillRect(px+15,py+8,3,3);ctx.fillRect(px+22,py+8,3,3);
    ctx.fillStyle='#222';ctx.fillRect(px+16,py+9,1,1);ctx.fillRect(px+23,py+9,1,1);
    // banda roja
    ctx.fillStyle='#c0392b';ctx.fillRect(px+11,py+1,18,4);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(px+11,py+1,18,1);
  }
  // Direction indicator
  ctx.fillStyle='rgba(0,255,100,0.3)';ctx.beginPath();
  ctx.arc(px+20,py+22,22,0,Math.PI*2);ctx.strokeStyle='rgba(0,255,100,0.1)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#00e676';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('🧙 tú',px+20,py+58);

  // Darkness overlay for dark rooms
  if(room.dark){
    const vis = lanternOn ? 5 : 2.5;
    const grad = ctx.createRadialGradient(px+20, py+20, 0, px+20, py+20, vis * TILE);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.4, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Partículas
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;

  // Números/textos flotantes
  for(const f of floaters){
    ctx.globalAlpha=Math.min(1, f.life/20);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText(f.text, f.x+1, f.y+1);
    ctx.fillStyle=f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1;

  // Viñeta ambiental (oscurece bordes para dar profundidad)
  if(!_vignette){
    _vignette=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,W*0.62);
    _vignette.addColorStop(0,'rgba(0,0,0,0)');
    _vignette.addColorStop(0.7,'rgba(0,0,0,0.12)');
    _vignette.addColorStop(1,'rgba(0,0,0,0.42)');
  }
  ctx.fillStyle=_vignette;ctx.fillRect(0,0,W,H);

  ctx.restore();

  // Fade de transición de sala (sobre todo, sin shake)
  if(fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

cmds.cd = {desc:'Cambia de sala (como cd en Linux)',usage:'cd <ruta>',run:(args)=>{
  if(!args[0])return tPrint('cd: falta argumento','err');
  const target=args[0].toLowerCase().replace(/\/$/,'');
  if(target==='..'){
    const back=rooms[player.room]?.overlays.find(o=>o.type==='door'&&o.label==='../');
    if(back&&back.room){
      if ((back.x !== player.px || back.y !== player.py) && !isMoving)
        return moveToTarget(back.x, back.y, () => cmds.cd.run(args));
      goToRoom(back.room, back);
    }else tPrint('cd: Ya estás en la raíz','warn');
    return;
  }
  const room=rooms[player.room];
  if(!room)return tPrint('cd: error interno','err');
  const door=room.overlays.find(o=>o.type==='door'&&o.label.replace(/\/$/,'').toLowerCase()===target);
  if(!door)return tPrint(`cd: ${args[0]}: No such directory`,'err');
  // Puzzle: la cima requiere ejecutar ascend.sh primero
  if(door.room==='/mountain/summit'&&!summitUnlocked)
    return tPrint('🔒 cd: summit/: Permiso denegado. Ejecuta "chmod +x ascend.sh" y luego "./ascend.sh".','err');
  if ((door.x !== player.px || door.y !== player.py) && !isMoving)
    return moveToTarget(door.x, door.y, () => cmds.cd.run(args));
  goToRoom(door.room, door);
}};

function findAdjacentWalkable(room, tx, ty) {
  for(const[dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]){
    const nx=tx+dx, ny=ty+dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
    const tile=room.tiles[ny]?.[nx];
    if(tile===undefined||tile==='skip')continue;
    const isDoor=room.overlays.some(o=>o.type==='door'&&o.x===nx&&o.y===ny);
    const occupied=room.overlays.some(o=>(o.type==='npc'||(o.type==='enemy'&&o.hp>0))&&o.x===nx&&o.y===ny);
    if(occupied)continue;
    if(isDoor||isWalkableTile(tile))return {x:nx,y:ny};
  }
  return null;
}

// ─── SAGE QUIZ ───
function startQuiz(){
  if(Date.now()<sageLockedUntil){
    const mins=Math.ceil((sageLockedUntil-Date.now())/60000);
    tPrint(`⏳ El Sabio está meditando. Vuelve en ${mins} minuto${mins!==1?'s':''}.`,'warn');
    return;
  }
  // Pick 3 random questions
  const shuffled=[...SAGE_QUESTIONS].sort(()=>Math.random()-0.5);
  quizState={questions:shuffled.slice(0,3),current:0,correct:0};
  gameState='quiz';
  showQuizQuestion();
}
function showQuizQuestion(){
  const qs=quizState;
  if(qs.current>=qs.questions.length){
    // All answered
    if(qs.correct===3){
      player.inventory.push('iron_key.txt');
      AUDIO.play('levelup');
      tPrint('🎉  ¡Respondiste todo correctamente! El Sabio te entrega una llave misteriosa.','out');
      tPrint('🔑  "Úsala con sabiduría. Abre lo que está cerrado."','dlg');
    }else{
      sageLockedUntil=Date.now()+60000;
      tPrint(`⏳  ${MOTIVATIONAL[Math.floor(Math.random()*MOTIVATIONAL.length)]}`,'lore');
      tPrint('El Sabio sonríe. "Vuelve en 1 minuto si quieres intentarlo de nuevo."','dlg');
    }
    quizState=null;gameState='idle';
    cmdEl.focus();
    return;
  }
  const q=qs.questions[qs.current];
  tPrint(`\n📖  Pregunta ${qs.current+1} de ${qs.questions.length}:`,'lore');
  tPrint(`  ${q.q}`,'help');
  for(let i=0;i<q.o.length;i++)tPrint(`  ${i+1}) ${q.o[i]}`,'help');
  tPrint('💡  Responde con 1, 2 o 3.','info');
  cmdEl.focus();
}
function handleQuizAnswer(val){
  const qs=quizState;
  if(!qs)return;
  const num=parseInt(val);
  if(isNaN(num)||num<1||num>3){
    tPrint('❌  Responde con 1, 2 o 3.','err');
    return;
  }
  const q=qs.questions[qs.current];
  if(num-1===q.a){
    AUDIO.play('correct');
    tPrint('✅  ¡Correcto!','success');
    qs.correct++;
  }else{
    AUDIO.play('wrong');
    tPrint(`❌  Incorrecto. La respuesta era: ${q.o[q.a]}`,'err');
    tPrint(`🍃  ${MOTIVATIONAL[Math.floor(Math.random()*MOTIVATIONAL.length)]}`,'lore');
  }
  qs.current++;
  showQuizQuestion();
}

function goToRoom(roomId, fromDoor){
  const room=rooms[roomId];
  if(!room)return tPrint(`cd: ${roomId}: Error interno`,'err');
  // Dark cave requires light_rod.txt
  if(room.dark && !player.inventory.includes('light_rod.txt')){
    return tPrint('❌ Está demasiado oscuro. Necesitas una fuente de luz para entrar aquí.','err');
  }
  const prevRoom=player.room;
  player.room=roomId;
  // Respawn enemies (reset HP) but keep kill flags
  room.overlays.forEach(o=>{if(o.type==='enemy')o.hp=o.maxHp;});
  if(fromDoor){
    // Find matching door in new room (door that leads back to previous room)
    const returnDoor=room.overlays.find(o=>o.type==='door'&&o.room===prevRoom);
    if(returnDoor){
      const adj=findAdjacentWalkable(room, returnDoor.x, returnDoor.y);
      if(adj){player.px=adj.x;player.py=adj.y;}
      else{player.px=returnDoor.x;player.py=returnDoor.y;}
    }else{
      const spawn=room.overlays.find(o=>o.type==='player');
      if(spawn){player.px=spawn.x;player.py=spawn.y;}

  }else{

    if(spawn){player.px=spawn.x;player.py=spawn.y;}
    else{player.px=10;player.py=5;}
  }
  fadeAlpha=1; // arranca transición fade-in
  renderRoom();
  updateHud();
  updatePrompt();
  clearHint();

cmds.cp = {desc:'Copia un item a tu inventario (Linux cp)',usage:'cp <item> [~/]',run:(args)=>{
  if(!args[0])return tPrint('cp: falta argumento','err');
  const target = findTarget(args[0]);
  if(!target || target.type!=='item' || !target.takeable){
    const exists = findTarget(args[0]);
    if(exists&&exists.type==='item'&&!exists.takeable)
      return tPrint(`cp: ${args[0]}: no se puede copiar este objeto`,'err');
    return tPrint(`cp: ${args[0]}: No such file or directory`,'err');
  }
  if ((target.x !== player.px || target.y !== player.py) && !isMoving)
    return moveToTarget(target.x, target.y, () => cmds.cp.run(args));
  let success=true;
  if(target.onTake){
    const res=target.onTake();
    if(res){
      if(Array.isArray(res)){tPrintMany([res]);if(res[1]==='err')success=false;}
      else tPrint(res,'out');
    }
  }else{
    player.inventory.push(target.label);
    diaryAdd('cp <item> ~/', 'Copia un item del suelo a tu inventario. Ej: cp shield.txt ~/');
    tPrint(`✅ Copiado: ${target.label}`,'out');
  }
  updateHud();
  if(success){
    AUDIO.play(target.label==='gold.txt'||target.label==='treasure.txt'?'coin':'pickup');
    const idx=rooms[player.room].overlays.indexOf(target);
    if(idx>-1)rooms[player.room].overlays.splice(idx,1);
  }
  renderRoom();
}};

cmds.ps = {desc:'Muestra enemigos como procesos con PID',run:()=>{

  if(!enemies.length)return tPrint('ps: No hay procesos enemigos en esta sala.','info');
  tPrint('PID    NAME            HP    ATK   DEF','help');

cmds.kill = {desc:'Ataca a un enemigo por PID (o inicia combate)',usage:'kill <PID>',run:(args)=>{
  const room=rooms[player.room];
  if(!room)return tPrint('kill: error interno','err');
  if(!args[0])return tPrint('kill: falta argumento. Usa "ps" para ver los PIDs.','err');
  const pid=parseInt(args[0]);
  if(isNaN(pid))return tPrint(`kill: ${args[0]}: not a process`,'err');
  let targetEnemy=null;
  for(let i=0;i<room.overlays.length;i++){
    if(room.overlays[i].type==='enemy'&&room.overlays[i].hp>0&&room.overlays[i]._uid===pid){
      targetEnemy=room.overlays[i];break;
    }
  }
  if(!targetEnemy)return tPrint(`kill: ${pid}: no such process`,'err');
  // If already in battle with this enemy, do a battle turn
  if(gameState==='battle'&&battleEnemy===targetEnemy){
    battleTurn();
    return;
  }
  if(gameState==='battle')return tPrint('kill: Ya estás en combate con otro enemigo. Usa "disown" para huir.','warn');
  // Start battle
  const dist=Math.abs(targetEnemy.x-player.px)+Math.abs(targetEnemy.y-player.py);
  if(dist>1&&!isMoving)
    return moveToTargetAdjacent(targetEnemy.x, targetEnemy.y, () => cmds.kill.run(args));
  gameState='battle';
  battleEnemy=targetEnemy;
  AUDIO.playTrack(targetEnemy.label==='Goblin_Chief'?'boss':'battle');
  diaryAdd('ps', 'Muestra los enemigos en la sala como procesos con PID.');
  diaryAdd('kill <PID>', 'Ataca a un enemigo por su PID. Ej: kill 1001.');
  tPrint(`⚔️  ¡${targetEnemy.label} aparece!`,'combat');
  tPrint(`  ${targetEnemy.dialog||''}`,'lore');
  tPrint(`  HP:${targetEnemy.hp}/${targetEnemy.maxHp}  ATK:${targetEnemy.atk}  DEF:${targetEnemy.def}`,'combat');
  if(targetEnemy.requires==='forest'&&player.atk<16){
    tPrint(`⚠️  Sin un arco (🏹 bow.txt, +4 atk) será muy difícil vencerlo.`,'warn');
  }
  // Show available combat skills/items
  const skillList=player.skills.map(s=>'./'+s.name.replace(/ /g,'_')).join(' ');
  const potion=player.inventory.includes('potion.txt')?' ./potion':'';
  if(skillList||potion)tPrint(`💡 Usa: ${skillList}${potion}`,'info');
  tPrint('══════════════════════════════','dim');
  tPrint('Presiona ESPACIO para atacar, escribe "disown" para huir.','info');
  cmdEl.focus();
}};

cmds.disown = {desc:'Huye del combate (Linux disown)',run:()=>{

}};

cmds.echo = {desc:'Repite texto. Redirige con > o >> a un archivo',usage:'echo "texto" [> archivo]',run:(args)=>{
  // Detectar redirección > o >>
  const gi=args.indexOf('>'), gg=args.indexOf('>>');
  if(gg>-1){
    const text=args.slice(0,gg).join(' ').replace(/^"|"$/g,'').replace(/\\n/g,'\n');
    const file=args[gg+1];
    if(!file)return tPrint('bash: error de sintaxis cerca de «>>»','err');
    homeFiles[file]=(homeFiles[file]?homeFiles[file]+'\n':'')+text;
    diaryAdd('echo "texto" >> archivo','Añade texto al final de un archivo (sin borrar lo anterior).');
    return;
  }
  if(gi>-1){
    const text=args.slice(0,gi).join(' ').replace(/^"|"$/g,'').replace(/\\n/g,'\n');
    const file=args[gi+1];
    if(!file)return tPrint('bash: error de sintaxis cerca de «>»','err');
    homeFiles[file]=text;
    diaryAdd('echo "texto" > archivo','Escribe texto en un archivo (sobrescribe el contenido).');
    return;
  }
  tPrint(args.join(' ').replace(/^"|"$/g,'').replace(/\\n/g,'\n'),'out');
}};

cmds.grep = {desc:'Busca un texto en un archivo. Uso: grep <texto> <archivo>',usage:'grep <patrón> <archivo>',run:(args)=>{
  if(args.length<2)return tPrint('grep: uso: grep <patrón> <archivo>','err');
  const pat=args[0];
  const file=args[1];
  // Buscar en archivos del home
  if(homeFiles[file]!==undefined){
    const lines=homeFiles[file].split('\n').filter(l=>l.toLowerCase().includes(pat.toLowerCase()));
    if(!lines.length)return tPrint('(sin coincidencias)','dim');
    lines.forEach(l=>tPrint(l.replace(new RegExp(`(${pat})`,'gi'),'⟦$1⟧'),'out'));
    diaryAdd('grep <patrón> <archivo>','Busca líneas que contengan un texto dentro de un archivo.');
    if(file==='lista.txt'&&pat.toLowerCase()==='dragon'){
      grepFoundDragon=true;
      // Reto de Greta: completar automáticamente si está en la villa y aún no se cobró
      if(!challengesDone['greta'] && rooms[player.room]?.overlays.some(o=>o.label==='Greta')){
        challengesDone['greta']=true;player.gold+=20;updateHud();AUDIO.play('coin');
        tPrint('','out');
        tPrint('📚 Greta: "¡Ahí está, "dragon"! La encontraste con grep.','dlg');
        tPrint('📚 Greta: "Toma 20 de oro por tu ayuda, archivista." (+20 oro)','success');
      }
    }
    return;
  }
  // Buscar en descripciones de items de la sala (lore)
  const t=findTarget(file);
  if(t&&t.desc){
    const lines=t.desc.split('\n').filter(l=>l.toLowerCase().includes(pat.toLowerCase()));
    if(!lines.length)return tPrint('(sin coincidencias)','dim');
    lines.forEach(l=>tPrint(l,'lore'));
    diaryAdd('grep <patrón> <archivo>','Busca líneas que contengan un texto dentro de un archivo.');
    return;
  }
  tPrint(`grep: ${file}: No such file or directory`,'err');
}};

cmds.find = {desc:'Busca elementos en la sala. Uso: find [-name <patrón>]',usage:'find [-name <patrón>]',run:(args)=>{

  const found=room.overlays.filter(o=>{
    if(!o.label)return false;

    if(o.hp!==undefined&&o.hp<=0)return false;
    if(pat)return o.label.toLowerCase().includes(pat);
    return true;
  });
  if(!found.length)return tPrint('find: (sin resultados)','dim');
  diaryAdd('find -name <patrón>','Lista elementos cuyo nombre coincide con un patrón.');
  for(const o of found){
    const kind=o.type==='enemy'?'⚔️':o.type==='npc'?'👤':o.type==='door'?'🚪':'📄';

// ─── BATTLE SYSTEM ───
function battleTurn() {
  if(!battleEnemy||battleEnemy.hp<=0){gameState='idle';battleEnemy=null;return;}
  const e=battleEnemy;
  // Track turn count for boss
  if(e.turnCount===undefined)e.turnCount=0;
  e.turnCount++;
  // Player attacks
  const dmg=Math.max(1,player.atk-e.def+Math.floor(Math.random()*4));
  e.hp=Math.max(0,e.hp-dmg);
  AUDIO.play('attack');
  tPrint(`⚔️  Atacas por ${dmg} daño.  ${e.label}: ${e.hp}/${e.maxHp} HP`,'combat');
  // Hit effect animation + FX
  hitEffect={x:e.x,y:e.y,life:6,color:'rgba(255,255,200,0.5)',border:'#ff0'};
  addFloater(e.x, e.y, `-${dmg}`, '#ffe082');
  spawnParticles(e.x, e.y, '#ffd54f', 8);
  screenShake(3, 4);
  if(e.hp<=0){
    player.xp+=e.xp||10;
    const eid=e._uid;
    const already=rewardedEnemies.has(eid);
    if(!already){player.gold+=e.gold||5;rewardedEnemies.add(eid);}
    if(e.label==='Goblin_Chief'){
      victoryBoss();
    }else{
      AUDIO.play('victory');
      const eid=e._uid;
      const reward=already?`🏆  ¡${e.label} derrotado! +${e.xp||10} XP (sin oro, ya derrotado antes)`:`🏆  ¡${e.label} derrotado! +${e.xp||10} XP +${e.gold||5} Oro`;
      tPrint(reward,'success');
    }
    player.kills++;
    checkLevelUp();
    renderRoom();
    gameState='idle';battleEnemy=null;
    updateHud();
    AUDIO.playTrack(AUDIO.trackForRoom(player.room, rooms[player.room]?.dark));
    return;
  }
  // Enemy attacks (boss has Mighty Blow every 3 turns)
  const isBoss=e.label==='Goblin_Chief';
  const isMighty=isBoss&&e.turnCount%3===0;
  const edmg=Math.max(1,(isMighty?e.atk*2:e.atk)-player.def+Math.floor(Math.random()*3));
  player.hp=Math.max(0,player.hp-edmg);
  AUDIO.play('hurt');
  if(isMighty)tPrint(`💥💥  ¡${e.label} usa MIGHTY BLOW! ${edmg} daño.  Tu HP: ${player.hp}/${player.maxHp}`,'combat');
  else tPrint(`💥  ${e.label} te ataca por ${edmg} daño.  Tu HP: ${player.hp}/${player.maxHp}`,'combat');
  // Player hit effect + FX
  playerHitEffect={x:player.px,y:player.py,life:5,color:'rgba(255,100,100,0.4)',border:'#f44'};
  addFloater(player.px, player.py, `-${edmg}`, '#ff6b6b');
  spawnParticles(player.px, player.py, '#f44', isMighty?16:8);
  screenShake(isMighty?9:5, isMighty?12:7);
  renderRoom();
  updateHud();
  if(player.hp<=0){
    AUDIO.play('error');
    tPrint('💀  Has muerto...','err');
    tPrint('  Pero el destino te da otra oportunidad.','warn');
    player.hp=Math.floor(player.maxHp/2);
    player.gold=Math.floor(player.gold/2);
    // Reset enemy HP so the fight starts fresh
    if(battleEnemy)battleEnemy.hp=battleEnemy.maxHp;
    // Move player to room spawn
    const spawn=rooms[player.room]?.overlays.find(o=>o.type==='player');
    if(spawn){player.px=spawn.x;player.py=spawn.y;}
    gameState='idle';battleEnemy=null;
    updateHud();
    renderRoom();
    AUDIO.playTrack(AUDIO.trackForRoom(player.room, rooms[player.room]?.dark));
      tPrint('💡  El enemigo se ha recuperado. Usa "kill <PID>" para intentar de nuevo.','info');
    return;
  }
  // Show enemy HP bar on map
  renderRoom();
  if(isBoss&&e.hp<e.maxHp*0.3)tPrint('⚠️  El Jefe Goblin está furioso... prepárate para su Mighty Blow.','warn');
      tPrint('Presiona ESPACIO para atacar de nuevo, o escribe "disown".','info');
}

function checkLevelUp() {
  while(player.xp>=player.xpNext){
    player.xp-=player.xpNext;
    player.level++;
    player.xpNext=Math.floor(player.xpNext*1.5);
    player.maxHp+=15;player.hp+=15;
    player.atk+=2;player.def+=1;
    AUDIO.play('levelup');
    addFloater(player.px, player.py, `¡NIVEL ${player.level}!`, '#ffd54f');
    spawnParticles(player.px, player.py, '#ffd54f', 24, 3.5);
    tPrint(`⭐  ¡SUBISTE AL NIVEL ${player.level}!`,'title');
  }
}

  if (gameState !== 'idle') return;

  switch(e.key) {
    case 'ArrowUp': e.preventDefault(); tryMove(0, -1); break;

    case 'ArrowLeft': e.preventDefault(); tryMove(-1, 0); break;

  }
});

    const parts=val.match(/(?:[^\s"]+|"[^"]*")+/g)||[];
    const room=rooms[player.room];
    if(!room)return;
    if(parts.length===0||!parts[parts.length-1]){

      const items=room.overlays.filter(o=>o.type==='item'||o.type==='npc'||o.type==='enemy'||o.type==='door').map(o=>o.label);
      if(items.length)tPrintMany(items.map(c=>['  '+c,'help']));
      return;
    }
    const partial=parts[parts.length-1].toLowerCase();
    if(!partial)return;
    const candidates=room.overlays.filter(o=>{
      const label=(o.label||'').toLowerCase();
      return label.startsWith(partial) || label.replace('.txt','').startsWith(partial);
    }).map(o=>o.label);
    if(candidates.length===0)return;
    if(candidates.length===1){
      const last=parts.pop();
      const prefix=val.slice(0,val.length-last.length);
      cmdEl.value=prefix+candidates[0];
    }else{
      tPrintMany(candidates.map(c=>['  '+c,'help']));
    }
  }
  // Space during battle
  else if(e.key===' '&&gameState==='battle'&&battleEnemy&&cmdEl.value.length===0){
    e.preventDefault();
    tPrint(`guest@aetheria:${player.room}$ (ESPACIO)`,'cmd');

});

  let trackTimer = null;
  let trackStep = 0;

  // Notas (Hz) — escala para melodías
  const N = {
    'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
    'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,
    'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,
    R:0, // silencio
  };

  function init() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = 0.35; musicGain.connect(masterGain);
      sfxGain = ctx.createGain(); sfxGain.gain.value = 0.55; sfxGain.connect(masterGain);
    } catch(e) { ctx = null; }
  }

  // Un tono con envolvente ADSR simple
  function tone(freq, dur, type='square', dest=sfxGain, vol=0.3) {
    if (!ctx || !freq) return;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    const t = ctx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.02);
  }

  // Ruido (para percusión / efectos ásperos)
  function noise(dur, vol=0.2, filterFreq=1000) {
    if (!ctx) return;
    const bufferSize = ctx.sampleRate * dur;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random()*2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buffer;
    const filter = ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=filterFreq;
    const g = ctx.createGain();
    const t = ctx.currentTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(filter); filter.connect(g); g.connect(sfxGain);
    src.start(t); src.stop(t + dur);
  }

  // ── Pistas musicales (loops de notas) ──
  // Cada pista: {tempo (ms/paso), bass[], lead[]}
  const TRACKS = {
    overworld: {
      tempo: 460, lofi: true,
      lead: ['C4','R','E4','R','G4','R','E4','R','F4','R','A4','R','G4','R','E4','R'],
      bass: ['C3','C3','G3','G3','F3','F3','G3','G3','C3','C3','A3','A3','G3','G3','C3','C3'],
    },
    castle: {
      tempo: 520, lofi: true,
      lead: ['E4','R','G4','R','B4','R','G4','R','A4','R','C5','R','G4','R','E4','R'],
      bass: ['E3','E3','B3','B3','C4','C4','G3','G3','A3','A3','E3','E3','B3','B3','E3','E3'],
    },
    forest: {
      tempo: 500, lofi: true,
      lead: ['A3','R','C4','R','E4','R','C4','R','D4','R','F4','R','E4','R','C4','R'],
      bass: ['A3','A3','F3','F3','C3','C3','G3','G3','A3','A3','F3','F3','E3','E3','A3','A3'],
    },
    village: {
      tempo: 480, lofi: true,
      lead: ['G4','R','A4','R','C5','R','A4','R','F4','R','G4','R','A4','R','G4','R'],
      bass: ['C3','C3','G3','G3','C3','C3','F3','F3','C3','C3','G3','G3','C3','C3','C3','C3'],
    },
    cave: {
      tempo: 440, lofi: true,
      lead: ['D4','R','R','F4','R','R','E4','R','D4','R','R','C4','R','R','A3','R'],
      bass: ['D3','D3','D3','D3','A3','A3','A3','A3','C3','C3','C3','C3','D3','D3','D3','D3'],
    },
    battle: {
      tempo: 160,
      lead: ['E4','E4','G4','E4','A4','G4','E4','D4','E4','E4','C5','B4','A4','G4','E4','E4'],
      bass: ['E3','E3','E3','E3','C3','C3','C3','C3','D3','D3','D3','D3','E3','E3','B3','B3'],
    },
    boss: {
      tempo: 150,
      lead: ['C4','C4','D4','Eb4','C4','Eb4','D4','C4','B3','C4','D4','F4','Eb4','D4','C4','C4'],
      bass: ['C3','C3','C3','G3','C3','C3','C3','Ab3','C3','C3','C3','F3','G3','G3','C3','C3'],
    },
  };
  // Añadir notas faltantes para boss (bemoles)
  N['Eb4']=311.13; N['Ab3']=207.65; N['B3']=246.94;

  function playTrack(name) {
    if (!ctx || !musicEnabled) { currentTrack = name; return; }
    if (currentTrack === name && trackTimer) return;
    currentTrack = name;
    if (trackTimer) { clearInterval(trackTimer); trackTimer = null; }
    const track = TRACKS[name];
    if (!track) return;
    trackStep = 0;
    const lofi = !!track.lofi;
    trackTimer = setInterval(() => {
      if (!musicEnabled) return;
      const lead = track.lead[trackStep % track.lead.length];
      const bass = track.bass[trackStep % track.bass.length];
      if (lofi) {
        // Exploración: cálido, suave, notas más largas
        tone(N[lead], track.tempo/1000*1.4, 'triangle', musicGain, 0.18);
        tone(N[bass], track.tempo/1000*1.4, 'sine', musicGain, 0.26);
        if (trackStep % 8 === 0) noise(0.04, 0.04, 4000); // percusión muy tenue
      } else {
        // Combate: enérgico, chiptune marcado
        tone(N[lead], track.tempo/1000*0.9, 'square', musicGain, 0.22);
        tone(N[bass], track.tempo/1000*0.9, 'triangle', musicGain, 0.30);
        if (trackStep % 4 === 0) noise(0.05, 0.08, 6000);
      }
      trackStep++;
    }, track.tempo);
  }

  function stopTrack() {
    if (trackTimer) { clearInterval(trackTimer); trackTimer = null; }
    currentTrack = null;
  }

  // ── Efectos de sonido ──
  const SFX = {
    attack(){ tone(180,0.08,'square',sfxGain,0.3); noise(0.08,0.15,2000); },
    hurt(){ tone(120,0.15,'sawtooth',sfxGain,0.3); tone(90,0.2,'sawtooth',sfxGain,0.2); },
    pickup(){ tone(N.C5,0.08,'square',sfxGain,0.25); tone(N.E5,0.08,'square',sfxGain,0.25); tone(N.G5,0.12,'square',sfxGain,0.25); },
    error(){ tone(140,0.12,'sawtooth',sfxGain,0.3); tone(100,0.18,'sawtooth',sfxGain,0.25); },
    levelup(){ [N.C4,N.E4,N.G4,N.C5,N.E5].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'square',sfxGain,0.3),i*70)); },
    victory(){ [N.C4,N.E4,N.G4,N.C5,N.G4,N.C5].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'square',sfxGain,0.3),i*120)); },
    door(){ tone(200,0.1,'triangle',sfxGain,0.25); tone(150,0.12,'triangle',sfxGain,0.2); },
    coin(){ tone(N.B4,0.06,'square',sfxGain,0.25); tone(N.E5,0.1,'square',sfxGain,0.25); },
    correct(){ tone(N.E4,0.1,'square',sfxGain,0.28); tone(N.A4,0.14,'square',sfxGain,0.28); },
    wrong(){ tone(N.A3,0.14,'sawtooth',sfxGain,0.28); tone(N.F3,0.2,'sawtooth',sfxGain,0.22); },
    select(){ tone(N.G4,0.04,'square',sfxGain,0.18); },
  };

  function play(name) {
    if (!ctx || !sfxEnabled) return;
    if (SFX[name]) SFX[name]();
  }

  // Arranca el contexto en el primer gesto del usuario
  function start() {
    if (started) return;
    init();
    if (ctx && ctx.state === 'suspended') ctx.resume();
    started = true;
    if (currentTrack) playTrack(currentTrack);
    else playTrack('overworld');
  }

  function setMusic(on) {
    musicEnabled = on;
    if (!on) stopTrack();
    else if (started && currentTrack) playTrack(currentTrack);
  }
  function setSfx(on) { sfxEnabled = on; }

  // Mapea sala → pista
  function trackForRoom(roomId, isDark) {
    if (isDark) return 'cave';
    if (roomId.startsWith('/castle')) return 'castle';
    if (roomId.startsWith('/village')) return 'village';
    if (roomId.startsWith('/forest')) return 'forest';
    return 'overworld';
  }

  return { start, play, playTrack, stopTrack, setMusic, setSfx,
           trackForRoom,
           get musicEnabled(){return musicEnabled;},
           get sfxEnabled(){return sfxEnabled;},
           get ready(){return started;} };
})();

// ─── INIT ───
function boot() {
  initWorld();
  // Assign unique IDs to every enemy
  let eid=1;
  for(const k in rooms)for(const o of rooms[k].overlays)if(o.type==='enemy')o._uid=eid++;
  player.room='/';
  const spawn=rooms['/'].overlays.find(o=>o.type==='player');
  if(spawn){player.px=spawn.x;player.py=spawn.y;}

  // Seed diary with basic commands
  diaryAdd('ls', 'Lista los elementos (items, NPCs, enemigos, puertas) en la sala.');

  diaryAdd('sudo <comando>', 'Ejecuta un comando con privilegios de administrador (root).');
  diaryAdd('ping <host>', 'Envía paquetes para comprobar si un host responde.');
  diaryAdd('wget <url>', 'Descarga archivos desde una URL.');
  diaryAdd('tar -xzf <archivo>', 'Extrae un archivo comprimido .tar.gz (con -czf comprime).');
  diaryAdd('cal', 'Muestra un calendario.');
  diaryAdd('music on|off', 'Activa o desactiva la música del juego.');
  diaryAdd('sound on|off', 'Activa o desactiva los efectos de sonido.');

  renderRoom();
  updateHud();
  updatePrompt();
  tPrint('','out');
  tPrint('  ╔════════════════════════════════════╗','title');
  tPrint('  ║     AETHERIA · RPG + TERMINAL      ║','title');
  tPrint('  ║   Aprende Linux mientras juegas    ║','title');
  tPrint('  ╚════════════════════════════════════╝','title');
  tPrint('','out');
  tPrint('Comandos: ls, cd, cat, cp, ps, kill, disown, pwd, whoami, echo, man, clear','help');
  tPrint('          grep, find, mkdir, touch, rm, mv, chmod, history, top, df, uname','help');
  tPrint('          sudo, ping, wget, tar, cal, diary, profile, save, load, ./','help');
  tPrint('          Soporta pipe: cat f | grep x   |   🏔️ ¡Explora la Montaña!','help');
  tPrint('','out');
  tPrint('🎮  Flechas: moverte.  📖  "cat diario.txt" o "diary" para tus comandos.','info');
  tPrint('🎵  Audio chiptune activo. Controla con "music on/off" y "sound on/off".','info');
  tPrint('','out');
  cmds.ls.run([]);
  tPrint('','out');
  tPrint('💡  Habla con los NPCs para aprender nuevos comandos.','info');
  cmdEl.focus();
  AUDIO.playTrack('overworld'); // queda en espera hasta el primer gesto del usuario
  setInterval(enemyPatrol, 2500);
  setInterval(npcPatrol, 2000);
  requestAnimationFrame(fxLoop); // bucle de animación continuo (bobbing, partículas, fade)
}

// Click anywhere to focus + arrancar audio en el primer gesto del usuario
document.addEventListener('click',()=>{cmdEl.focus();AUDIO.start();});
document.addEventListener('keydown',()=>{AUDIO.start();},{once:false});

boot();
</script>
